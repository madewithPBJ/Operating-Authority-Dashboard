<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operating Authority Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Stack+Sans+Headline:wght@300..600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <h1>Operating Authority</h1>
      <p>Enter your password to continue</p>
      <form id="login-form">
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Log In</button>
      </form>
      <p id="login-error" class="error" hidden></p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="screen" hidden>
    <header>
      <h1>Operating Authority</h1>
      <nav>
        <button class="nav-btn active" data-view="customers">Customers</button>
        <button class="nav-btn" data-view="transcriptions">Transcriptions</button>
      </nav>
      <button id="logout-btn">Log Out</button>
    </header>

    <!-- View: Customer Overview -->
    <section id="view-customers" class="view">
      <div class="section-header">
        <h2>Customers</h2>
        <button id="add-customer-btn" class="btn-primary">+ Add Customer</button>
      </div>

      <div id="add-customer-form" class="inline-form" hidden>
        <input type="text" id="new-customer-name" placeholder="Name" required>
        <input type="tel" id="new-customer-phone" placeholder="Phone (e.g. 7205551234)" required>
        <button id="save-customer-btn" class="btn-primary">Save</button>
        <button id="cancel-customer-btn" class="btn-secondary">Cancel</button>
      </div>

      <div id="customers-list" class="card-list">
        <p class="loading">Loading customers...</p>
      </div>
    </section>

    <!-- View: Customer Detail -->
    <section id="view-detail" class="view" hidden>
      <div class="breadcrumb">
        <button id="back-to-customers" class="btn-back">&larr; Customers</button>
      </div>

      <div class="detail-header">
        <div>
          <h2 id="detail-name"></h2>
          <p id="detail-phone" class="text-muted"></p>
        </div>
        <div class="detail-actions">
          <button id="detail-edit-btn" class="btn-small">Edit</button>
          <button id="detail-delete-btn" class="btn-danger">Delete</button>
        </div>
      </div>

      <div class="detail-section">
        <div class="section-header">
          <span class="section-label">Prompts</span>
          <button id="new-prompt-btn" class="btn-primary">Send New Prompt</button>
        </div>
        <div id="prompt-history">
          <p class="loading">Loading prompts...</p>
        </div>
      </div>
    </section>

    <!-- View: Prompt Composer -->
    <section id="view-composer" class="view" hidden>
      <div class="breadcrumb">
        <button id="back-to-detail" class="btn-back">&larr; Back</button>
      </div>

      <h2>Send New Prompt</h2>
      <p class="text-muted" id="composer-recipient"></p>

      <div class="composer-form">
        <label class="field-label">Intro message</label>
        <input type="text" id="composer-intro" value="Hey! Here are this week's questions:">

        <label class="field-label">Paste your numbered questions</label>
        <textarea id="composer-questions" rows="6" placeholder="1. What's your biggest challenge right now?&#10;2. How did last week go?&#10;3. What's next for you?"></textarea>

        <label class="field-label">Outro message</label>
        <input type="text" id="composer-outro" value="Just reply with a voice note for each one.">

        <div id="composer-preview" hidden>
          <label class="field-label">Preview</label>
          <div id="preview-content" class="preview-box"></div>
        </div>

        <div id="composer-status" hidden></div>

        <div class="composer-actions">
          <button id="composer-preview-btn" class="btn-secondary">Preview</button>
          <button id="composer-send-btn" class="btn-primary">Send Prompt</button>
        </div>
      </div>
    </section>

    <!-- View: Raw Transcriptions -->
    <section id="view-transcriptions" class="view" hidden>
      <div class="section-header">
        <h2>Transcriptions</h2>
        <select id="filter-customer">
          <option value="">All Customers</option>
        </select>
      </div>
      <div id="transcriptions-list" class="card-list">
        <p class="loading">Loading transcriptions...</p>
      </div>
    </section>
  </div>

  <!-- Edit Customer Modal -->
  <div id="edit-modal" class="modal" hidden>
    <div class="modal-content">
      <h3>Edit Customer</h3>
      <input type="hidden" id="edit-customer-id">
      <input type="text" id="edit-customer-name" placeholder="Name">
      <input type="tel" id="edit-customer-phone" placeholder="Phone">
      <div class="modal-actions">
        <button id="edit-save-btn" class="btn-primary">Save</button>
        <button id="edit-cancel-btn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Reassign Response Modal -->
  <div id="reassign-modal" class="modal" hidden>
    <div class="modal-content">
      <h3>Reassign Response</h3>
      <input type="hidden" id="reassign-transcription-id">
      <label class="field-label">Move to question</label>
      <select id="reassign-question-select"></select>
      <div class="modal-actions">
        <button id="reassign-save-btn" class="btn-primary">Save</button>
        <button id="reassign-cancel-btn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
